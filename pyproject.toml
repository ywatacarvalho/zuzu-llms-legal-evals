[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]

[tool.coverage.run]
concurrency = ["greenlet", "thread"]
source = ["backend/app"]

[tool.coverage.report]
skip_empty = true
show_missing = true
